<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUYEON ONLY</title>
    <style>
        body { 
            background: #0e0e12; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
            padding-top: 80px;
        }
        
        .title-img { width: 300px; margin-bottom: 30px; } 
        
        .menu { display: flex; gap: 20px; align-items: center; }

        .menu a { display: flex; align-items: center; justify-content: center; }

        .menu a img { 
            height: 60px;
            width: auto;
            object-fit: contain;
            display: block;
            transition: transform 0.3s; 
        }
        
        .menu a:hover img { transform: scale(1.1); }
        
        /* 모바일용 설정 */
        @media (max-width: 600px) {
            .title-img { width: 80%; }
            .menu a img { height: 50px; }
        }
    </style>
</head>
<body>

    <img src="indeximage/index.png" alt="YUYEON ONLY" class="title-img">
    
    <div class="menu">
        <a href="work.html"><img src="indeximage/button1.png" alt="작품 소개"></a>
        <a href="flip.html"><img src="indeximage/button2.png" alt="카드 뒤집기"></a>
    </div>

</body>
</html>
