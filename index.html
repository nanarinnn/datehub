<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Flip</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Playfair+Display:wght@700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e12;
    --card-w: 160px;
    --card-h: 240px;
    --radius: 16px;
    --gap: 20px;
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
  }

  /* ambient background blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: .25;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #6c3bff, transparent 70%);
    top: -200px; left: -200px;
  }
  body::after {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #ff3b8b, transparent 70%);
    bottom: -150px; right: -150px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    color: #fff;
    font-size: clamp(1.4rem, 3vw, 2rem);
    letter-spacing: .04em;
    margin-bottom: 3rem;
    opacity: 0;
    transform: translateY(-16px);
    animation: fadeUp .6s .2s ease forwards;
    z-index: 1;
  }

  .deck {
    display: flex;
    gap: var(--gap);
    z-index: 1;
    perspective: 1200px;
  }

  /* ── card wrapper ── */
  .card-wrap {
    width: var(--card-w);
    height: var(--card-h);
    perspective: 800px;
    cursor: pointer;
    opacity: 0;
    transform: translateY(40px) scale(.9);
    animation: cardIn .55s ease forwards;
  }
  .card-wrap:nth-child(1) { animation-delay: .35s; }
  .card-wrap:nth-child(2) { animation-delay: .48s; }
  .card-wrap:nth-child(3) { animation-delay: .61s; }
  .card-wrap:nth-child(4) { animation-delay: .74s; }
  .card-wrap:nth-child(5) { animation-delay: .87s; }

  .card-wrap:hover .card-inner:not(.flipped) {
    transform: rotateY(8deg) translateY(-6px);
    box-shadow: -10px 24px 48px rgba(0,0,0,.55);
  }

  /* ── 3d inner ── */
  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .65s cubic-bezier(.23,1,.32,1),
                box-shadow .3s ease;
    border-radius: var(--radius);
    box-shadow: 0 8px 32px rgba(0,0,0,.45);
  }
  .card-inner.flipped {
    transform: rotateY(180deg) translateY(-8px);
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
  }

  /* ── faces ── */
  .face {
    position: absolute; inset: 0;
    border-radius: var(--radius);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* FRONT */
  .front {
    background: linear-gradient(145deg, #1c1c2e 0%, #14142a 100%);
    border: 1px solid rgba(255,255,255,.08);
  }
  .front .pattern {
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,.03) 0px, rgba(255,255,255,.03) 1px, transparent 1px, transparent 10px),
      repeating-linear-gradient(-45deg, rgba(255,255,255,.03) 0px, rgba(255,255,255,.03) 1px, transparent 1px, transparent 10px);
  }
  .front .logo {
    font-size: 3rem;
    z-index: 1;
    filter: drop-shadow(0 0 12px rgba(255,255,255,.2));
    transition: transform .3s ease;
  }
  .card-wrap:hover .front .logo { transform: scale(1.12); }
  .front .num {
    position: absolute;
    bottom: 14px; right: 16px;
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .12em;
    color: rgba(255,255,255,.18);
    text-transform: uppercase;
  }

  /* BACK */
  .back {
    transform: rotateY(180deg);
    padding: 24px 20px;
    color: #fff;
  }
  .back .icon { font-size: 2.4rem; margin-bottom: 14px; }
  .back .label {
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    opacity: .55;
    margin-bottom: 8px;
  }
  .back .value {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    line-height: 1.3;
    text-align: center;
  }
  .back .desc {
    font-size: .72rem;
    font-weight: 300;
    opacity: .7;
    margin-top: 10px;
    text-align: center;
    line-height: 1.55;
  }
  .back .shine {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.12) 0%, transparent 60%);
    pointer-events: none;
  }

  /* individual card back colors */
  .card-wrap:nth-child(1) .back { background: linear-gradient(150deg, #3b1fa8, #6c3bff); }
  .card-wrap:nth-child(2) .back { background: linear-gradient(150deg, #a8381f, #ff6b3b); }
  .card-wrap:nth-child(3) .back { background: linear-gradient(150deg, #1f6e3b, #3bff9a); color: #0a2a18; }
  .card-wrap:nth-child(3) .back .desc { color: #0a2a18; }
  .card-wrap:nth-child(4) .back { background: linear-gradient(150deg, #8a1f8f, #ff3bd6); }
  .card-wrap:nth-child(5) .back { background: linear-gradient(150deg, #1a5a8a, #3baeff); }

  /* hint below */
  .hint {
    margin-top: 2.5rem;
    font-size: .75rem;
    color: rgba(255,255,255,.22);
    letter-spacing: .1em;
    text-transform: uppercase;
    z-index: 1;
    opacity: 0;
    animation: fadeUp .5s 1.2s ease forwards;
  }

  /* flip-all button */
  .btn-row {
    display: flex; gap: 12px;
    margin-top: 1.5rem;
    z-index: 1;
    opacity: 0;
    animation: fadeUp .5s 1.3s ease forwards;
  }
  button {
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.14);
    color: rgba(255,255,255,.7);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: .75rem;
    letter-spacing: .08em;
    padding: 8px 20px;
    border-radius: 50px;
    cursor: pointer;
    transition: background .2s, border-color .2s, color .2s;
  }
  button:hover {
    background: rgba(255,255,255,.14);
    border-color: rgba(255,255,255,.3);
    color: #fff;
  }

  /* keyframes */
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @media (max-width: 600px) {
    :root { --card-w: 130px; --card-h: 200px; --gap: 12px; }
    .deck { flex-wrap: wrap; justify-content: center; max-width: 320px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .card-inner { transition: none; }
    .card-wrap, h1, .hint, .btn-row { animation: none; opacity: 1; transform: none; }
  }
</style>
</head>
<body>

<h1>카드를 눌러보세요</h1>

<div class="deck" id="deck">

  <div class="card-wrap" onclick="flip(this)">
    <div class="card-inner">
      <div class="face front">
        <div class="pattern"></div>
        <div class="logo">✦</div>
        <div class="num">01</div>
      </div>
      <div class="face back">
        <div class="shine"></div>
        <div class="icon">🔮</div>
        <div class="label">오늘의 운세</div>
        <div class="value">대길</div>
        <div class="desc">뜻밖의 행운이<br>찾아올 징조</div>
      </div>
    </div>
  </div>

  <div class="card-wrap" onclick="flip(this)">
    <div class="card-inner">
      <div class="face front">
        <div class="pattern"></div>
        <div class="logo">✦</div>
        <div class="num">02</div>
      </div>
      <div class="face back">
        <div class="shine"></div>
        <div class="icon">🔥</div>
        <div class="label">에너지</div>
        <div class="value">열정</div>
        <div class="desc">지금 이 순간이<br>최고의 타이밍</div>
      </div>
    </div>
  </div>

  <div class="card-wrap" onclick="flip(this)">
    <div class="card-inner">
      <div class="face front">
        <div class="pattern"></div>
        <div class="logo">✦</div>
        <div class="num">03</div>
      </div>
      <div class="face back">
        <div class="shine"></div>
        <div class="icon">🌿</div>
        <div class="label">메시지</div>
        <div class="value">성장</div>
        <div class="desc">새로운 시작을<br>두려워 말것</div>
      </div>
    </div>
  </div>

  <div class="card-wrap" onclick="flip(this)">
    <div class="card-inner">
      <div class="face front">
        <div class="pattern"></div>
        <div class="logo">✦</div>
        <div class="num">04</div>
      </div>
      <div class="face back">
        <div class="shine"></div>
        <div class="icon">💫</div>
        <div class="label">키워드</div>
        <div class="value">직관</div>
        <div class="desc">마음이 이끄는 대로<br>따라가세요</div>
      </div>
    </div>
  </div>

  <div class="card-wrap" onclick="flip(this)">
    <div class="card-inner">
      <div class="face front">
        <div class="pattern"></div>
        <div class="logo">✦</div>
        <div class="num">05</div>
      </div>
      <div class="face back">
        <div class="shine"></div>
        <div class="icon">🌊</div>
        <div class="label">흐름</div>
        <div class="value">평온</div>
        <div class="desc">잠시 멈추고<br>숨을 고르세요</div>
      </div>
    </div>
  </div>

</div>

<p class="hint">click to reveal · click again to hide</p>

<div class="btn-row">
  <button onclick="flipAll()">모두 뒤집기</button>
  <button onclick="resetAll()">되돌리기</button>
</div>

<script>
  function flip(wrap) {
    wrap.querySelector('.card-inner').classList.toggle('flipped');
  }
  function flipAll() {
    document.querySelectorAll('.card-inner').forEach((c, i) => {
      setTimeout(() => c.classList.add('flipped'), i * 80);
    });
  }
  function resetAll() {
    document.querySelectorAll('.card-inner').forEach((c, i) => {
      setTimeout(() => c.classList.remove('flipped'), i * 80);
    });
  }
</script>
</body>
</html>
