<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>YUYEON ONLY</title>
    <style>
        body { 
            background: #0e0e12; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        
        .title-img { width: 300px; margin-bottom: 30px; } /* 제목 크기 조정 */
        
        .menu { display: flex; gap: 20px; }

         .menu a img { 
    height: 60px;       /* 원하는 높이값으로 통일하세요 */
    width: auto;        /* 가로는 높이에 맞춰 비율이 자동 조정됨 */
    object-fit: contain; /* 이미지가 찌그러지지 않게 함 */
    transition: transform 0.3s; 
}
        }
        
        .menu a:hover img { 
            transform: scale(1.1); /* 마우스 올리면 살짝 커짐 */
            
            @media (max-width: 600px) {
            .title-img { width: 80%; }
            .menu a img { width: 120px; }
        }
    </style>
</head>
<body>

    <img src="indeximage/index.png" alt="YUYEON ONLY" class="title-img">
    
    <div class="menu">
        <a href="work.html"><img src="indeximage/button1.png" alt="작품 소개"></a>
        <a href="flip.html"><img src="indeximage/button2.png" alt="카드 뒤집기"></a>
    </div>

</body>
</html>
