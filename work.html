<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>작품 소개 | YUYEON ONLY</title>
    <style>
        body { background: #0e0e12; color: #fff; font-family: 'Noto Sans KR', sans-serif; padding: 40px; }
        .home-btn { color: rgba(255,255,255,0.4); text-decoration: none; margin-bottom: 20px; display: block; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .work-item { border: 1px solid #333; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .work-item:hover { transform: translateY(-10px); border-color: #6c3bff; }
        .work-item img { width: 100%; height: 200px; object-fit: cover; }
        .work-item h3 { padding: 15px; margin: 0; font-size: 1rem; }
    </style>
</head>
<body>
    <a href="index.html" class="home-btn">← HOME</a>
    <h1>WORKS</h1>
    <div class="gallery">
        <a href="detail1.html" class="work-item">
            <img src="작품이미지1.jpg" alt="작품1">
            <h3>프로젝트 제목 1</h3>
        </a>
        <a href="detail2.html" class="work-item">
            <img src="작품이미지2.jpg" alt="작품2">
            <h3>프로젝트 제목 2</h3>
        </a>
    </div>
</body>
</html>
