<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>작품 추천 | YUYEON ONLY</title>
    <style>
        body { 
            background: #0e0e12; 
            color: #fff; 
            font-family: 'Noto Sans KR', sans-serif; 
            padding: 40px; 
        }
        
        .home-btn { 
            color: rgba(255,255,255,0.4); 
            text-decoration: none; 
            margin-bottom: 20px; 
            display: block; 
        }
        
        h1 { text-align: center; margin-bottom: 30px; }

        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            margin-top: 30px; 
            max-width: 1000px; 
            margin-left: auto;
            margin-right: auto;
        }

        .work-item { 
            display: flex; 
            flex-direction: column;
            width: fit-content; 
            margin: 0 auto;    
            border: 1px solid #333; 
            border-radius: 12px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: 0.3s; 
            text-decoration: none; 
            color: white; 
            background: #1c1c2e;
        }
        
        .work-item:hover { 
            transform: translateY(-10px); 
            border-color: #6c3bff; 
        }
        
        .work-item img { 
            width: 100%; 
            max-width: 400px; /* 이미지 너비 제한 */
            height: auto;      
            display: block;    
        }
        
        .work-item h3 { 
            padding: 15px; 
            margin: 0; 
            font-size: 1rem; 
            text-align: center; 
        }

        /* 모바일 최적화 */
        @media (max-width: 600px) {
            body { padding: 20px; }
            .gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="home-btn">← HOME</a>
    <h1>작품 추천</h1>
    
    <div class="gallery">
        <a href="#" class="work-item">
            <img src="workimage/work1.png" alt="작품1">
            <h3>뮤지컬 사의찬미 "사내"</h3>
        </a>
        
        </div>
</body>
</html>
