<style>
  /* 1. 폰트 불러오기 */
  @import url('https://fonts.googleapis.com/css2?family=Bagel+Fat+One&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');

  /* 2. 초기 설정 */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e12;
    --card-w: 160px;
    --card-h: 240px;
    --radius: 16px;
    --gap: 20px;
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
  }

  /* 3. 하나로 정리된 h1 스타일 */
  h1 {
    font-family: 'Bagel Fat One', cursive;
    color: #fff;
    margin-bottom: 3rem;
    font-size: 2.5rem;
  }

  /* 홈 버튼 스타일 */
  .home-btn { 
    position: absolute; top: 30px; left: 30px; 
    color: rgba(255,255,255,0.4); 
    text-decoration: none; 
    font-size: 0.8rem; 
    letter-spacing: 0.1em;
    z-index: 10;
    transition: color 0.3s;
  }
  .home-btn:hover { color: #fff; }

  /* 나머지 카드 스타일은 그대로 유지 */
  .deck { display: flex; gap: var(--gap); perspective: 1200px; }
  .card-wrap { width: var(--card-w); height: var(--card-h); perspective: 800px; cursor: pointer; }
  .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform .65s cubic-bezier(.23,1,.32,1); border-radius: var(--radius); }
  .card-inner.flipped { transform: rotateY(180deg); }
  .face { position: absolute; inset: 0; border-radius: var(--radius); backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .front { background: linear-gradient(145deg, #1c1c2e 0%, #14142a 100%); border: 1px solid rgba(255,255,255,.08); color: #fff; font-size: 2rem; }
  .back { transform: rotateY(180deg); padding: 20px; color: #fff; text-align: center; }
  .c1 { background: linear-gradient(150deg, #3b1fa8, #6c3bff); }
  .c2 { background: linear-gradient(150deg, #a8381f, #ff6b3b); }
  .c3 { background: linear-gradient(150deg, #1f6e3b, #3bff9a); color: #0a2a18; }
  .c4 { background: linear-gradient(150deg, #8a1f8f, #ff3bd6); }

  @media (max-width: 600px) {
    .deck { flex-wrap: wrap; justify-content: center; max-width: 320px; }
  }
</style>
