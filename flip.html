<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카드 뒤집기 | YUYEON ONLY</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Playfair+Display:wght@700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e12;
    --card-w: 160px;
    --card-h: 240px;
    --radius: 16px;
    --gap: 20px;
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
  }

  /* 홈 버튼 스타일 */
  .home-btn { 
    position: absolute; top: 30px; left: 30px; 
    color: rgba(255,255,255,0.4); 
    text-decoration: none; 
    font-size: 0.8rem; 
    letter-spacing: 0.1em;
    z-index: 10;
    transition: color 0.3s;
  }
  .home-btn:hover { color: #fff; }

  h1 {
    font-family: 'Playfair Display', serif;
    color: #fff;
    margin-bottom: 3rem;
  }

  .deck { display: flex; gap: var(--gap); perspective: 1200px; }

  .card-wrap {
    width: var(--card-w);
    height: var(--card-h);
    perspective: 800px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .65s cubic-bezier(.23,1,.32,1);
    border-radius: var(--radius);
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .face {
    position: absolute; inset: 0;
    border-radius: var(--radius);
    backface-visibility: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  .front { background: linear-gradient(145deg, #1c1c2e 0%, #14142a 100%); border: 1px solid rgba(255,255,255,.08); color: #fff; font-size: 2rem; }
  .back { transform: rotateY(180deg); padding: 20px; color: #fff; text-align: center; }

  /* 카드별 그라데이션 */
  .c1 { background: linear-gradient(150deg, #3b1fa8, #6c3bff); }
  .c2 { background: linear-gradient(150deg, #a8381f, #ff6b3b); }
  .c3 { background: linear-gradient(150deg, #1f6e3b, #3bff9a); }
  .c4 { background: linear-gradient(150deg, #8a1f8f, #ff3bd6); }

  @media (max-width: 600px) {
    .deck { flex-wrap: wrap; justify-content: center; max-width: 320px; }
  }
</style>
</head>
<body>

<a href="index.html" class="home-btn">← HOME</a>

<h1>카드를 눌러보세요</h1>

<div class="deck">
  <div class="card-wrap" onclick="this.querySelector('.card-inner').classList.toggle('flipped')">
    <div class="card-inner"><div class="face front">01</div><div class="face back c1">대길<br>뜻밖의 행운</div></div>
  </div>
  <div class="card-wrap" onclick="this.querySelector('.card-inner').classList.toggle('flipped')">
    <div class="card-inner"><div class="face front">02</div><div class="face back c2">열정<br>최고의 타이밍</div></div>
  </div>
  <div class="card-wrap" onclick="this.querySelector('.card-inner').classList.toggle('flipped')">
    <div class="card-inner"><div class="face front">03</div><div class="face back c3">성장<br>새로운 시작</div></div>
  </div>
  <div class="card-wrap" onclick="this.querySelector('.card-inner').classList.toggle('flipped')">
    <div class="card-inner"><div class="face front">04</div><div class="face back c4">직관<br>마음을 따라가기</div></div>
  </div>
</div>

</body>
</html>
